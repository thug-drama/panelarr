<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f1220"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.5" fill="white" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Logo mark -->
  <g transform="translate(476, 180)">
    <rect width="96" height="96" rx="18" fill="#6366f1"/>
    <rect x="12" y="12" width="32" height="32" rx="6" fill="white" opacity="0.35"/>
    <rect x="52" y="12" width="32" height="32" rx="6" fill="white" opacity="0.9"/>
    <rect x="12" y="52" width="32" height="32" rx="6" fill="white" opacity="0.35"/>
    <rect x="52" y="52" width="32" height="32" rx="6" fill="white" opacity="0.35"/>
  </g>
  <!-- Wordmark -->
  <text x="590" y="245" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="48" fill="white">panel</text>
  <text x="808" y="245" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="48" fill="#6366f1">arr</text>
  <!-- Tagline -->
  <text x="600" y="340" font-family="'Geist Mono', monospace" font-weight="400" font-size="18" fill="white" opacity="0.5" text-anchor="middle">homelab media control center</text>
</svg>
