    <rect x="10" y="10" width="28" height="28" rx="5" fill="white" opacity="0.35"/>
    <rect x="42" y="10" width="28" height="28" rx="5" fill="white" opacity="0.9"/>
    <rect x="10" y="42" width="28" height="28" rx="5" fill="white" opacity="0.35"/>
