name: deploy

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-develop
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, panelarr]
    steps:
      - name: Deploy in place
        run: |
          set -euo pipefail
          cd /opt/panelarr
          git fetch origin
          git checkout origin/develop -- backend/ frontend/ pyproject.toml Dockerfile entrypoint.sh .github/
          docker compose build --no-cache
          docker compose up -d
          docker image prune -f
          echo "Deploy complete"
